<!--
API development is the end-to-end process of creating, building, testing, deploying, and managing Application Programming Interfaces
that allow different software applications to communicate and share data securely and efficiently.
This process is central to modern software architecture,
enabling integration, automation, and the creation of new services


Core Concepts:-

API (Application Programming Interface): A set of rules and protocols that acts as a messenger or a contract between a client and a server, defining how they interact

Client-Server Model: The client (e.g, a mobile app) sends a request to the server (e.g, a database), the API acts as the intermediary, and the server returns a response

Endpoints: Specific URLs where an API can be accessed 
(e.g, a database), the API acts as the intermediary, and the server returns a response

Endpoints: Specific URLs where an API can be accessed (e.g, https://api.example.com/users)

HTTP Methods: Standard actions used in web APIs, including

GET: Relneves data

POST: Submits new data to create a resource

PUT: Updates an existing resource

DELETE: Removes a specified resource
