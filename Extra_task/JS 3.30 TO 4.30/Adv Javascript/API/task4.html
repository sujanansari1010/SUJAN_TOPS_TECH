<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="container">
        <div class="row">

        </div>
    </div>

    <script>
        fetch("https://dummyjson.com/products",{
            method: "GET"
        })
            .then((res) => {
                return res.json()
            })
            .then((data) => {
                console.log(data)

                // IMPORTANT: data.products use karna hai
                for (let product of data.products) {

                    let body = document.querySelector(".row")

                    let htmldata =  `
                        <div class="col-md-4 mt-3">
                            <div class="card" style="width: 18rem;">
                            <img src="${product.thumbnail}" height="300px" class="card-img-top" alt="...">
                            <div class="card-body">
                                <h5 class="card-title">${product.title}</h5>
                                <p class="card-text">${product.description.slice(0,35)}</p>
                                <h5 class="card-title">${product.price}$</h5>
                                <a href="#" class="btn btn-primary">Buy</a>
                                <a href="#" class="btn btn-primary">Add to cart</a>
                            </div>
                        </div>
                        </div>
                    `
                    body.innerHTML += htmldata
                }
            })
    </script>

</body>
</html>
